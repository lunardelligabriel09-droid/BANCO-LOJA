<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja — Gestão de Produtos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🛒 Loja — Gestão de Produtos</h1>
  </header>

  <main>

    <!-- ── Formulário ────────────────────────────────── -->
    <section class="card">
      <h2 id="form-titulo">Adicionar Produto</h2>
      <form id="form-produto">
        <input type="hidden" id="produto-id" />

        <div class="form-grid">
          <div class="campo">
            <label for="nome">Nome *</label>
            <input type="text" id="nome" placeholder="Ex: Notebook Dell" required />
          </div>

          <div class="campo">
            <label for="preco">Preço (R$) *</label>
            <input type="number" id="preco" min="0" step="0.01" placeholder="0.00" required />
          </div>

          <div class="campo">
            <label for="estoque">Estoque</label>
            <input type="number" id="estoque" min="0" value="0" />
          </div>

          <div class="campo">
            <label for="categoria">Categoria</label>
            <select id="categoria">
              <option value="">— Sem categoria —</option>
            </select>
          </div>

          <div class="campo full">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" rows="2" placeholder="Detalhes do produto..."></textarea>
          </div>
        </div>

        <div class="form-acoes">
          <button type="submit" class="btn btn-primary" id="btn-salvar">Salvar Produto</button>
          <button type="button" class="btn btn-secondary" id="btn-cancelar" style="display:none">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- ── Tabela de produtos ────────────────────────── -->
    <section class="card">
      <div class="tabela-header">
        <h2>Produtos Cadastrados</h2>
        <span id="total-produtos" class="badge"></span>
      </div>

      <div class="table-wrapper">
        <table id="tabela-produtos">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Preço</th>
              <th>Estoque</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="vazio">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- ── Modal de confirmação de exclusão ─────────────── -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <p>Tem certeza que deseja remover este produto?</p>
      <div class="modal-acoes">
        <button class="btn btn-danger"     id="btn-confirmar-delete">Remover</button>
        <button class="btn btn-secondary"  id="btn-cancelar-delete">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
